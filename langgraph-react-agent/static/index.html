<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LangGraph ReAct Agent</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --panel-2: #1e222b; --border: #2a2f3a;
    --text: #e6e8ec; --muted: #9aa4b2; --accent: #5b9dff; --user: #2b3444;
    --tool: #3a2f12; --tool-text: #e7c86b; --err: #4a1f22; --err-text: #ff9a9a;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--text); display: flex; justify-content: center;
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .app { display: flex; flex-direction: column; width: 100%; max-width: 820px; height: 100vh; }
  header {
    display: flex; align-items: center; gap: 12px; padding: 14px 18px;
    border-bottom: 1px solid var(--border); background: var(--panel);
  }
  header h1 { font-size: 15px; font-weight: 600; margin: 0; flex: 1; }
  header .dot { width: 8px; height: 8px; border-radius: 50%; background: #666; }
  header .dot.ok { background: #46c26b; } header .dot.bad { background: #e05c5c; }
  header .meta { color: var(--muted); font-size: 12px; }
  header button {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 12px; font-size: 13px; cursor: pointer;
  }
  header button:hover { border-color: var(--accent); }
  #messages { flex: 1; overflow-y: auto; padding: 20px 18px; display: flex; flex-direction: column; gap: 14px; }
  .msg { display: flex; }
  .msg.user { justify-content: flex-end; }
  .bubble {
    max-width: 78%; padding: 10px 14px; border-radius: 14px; white-space: pre-wrap;
    word-wrap: break-word; overflow-wrap: anywhere;
  }
  .msg.user .bubble { background: var(--user); border-bottom-right-radius: 4px; }
  .msg.assistant .bubble { background: var(--panel-2); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .tools { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .tool-chip {
    font-size: 12px; color: var(--tool-text); background: var(--tool);
    border: 1px solid #4d3f18; border-radius: 999px; padding: 2px 10px;
  }
  .tool-chip::before { content: "⚙ "; }
  .err { color: var(--err-text); background: var(--err); border: 1px solid #6a2a2e; }
  .cursor::after { content: "▌"; color: var(--accent); animation: blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  form {
    display: flex; gap: 10px; padding: 14px 18px; border-top: 1px solid var(--border); background: var(--panel);
  }
  textarea {
    flex: 1; resize: none; background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px;
    font: inherit; max-height: 160px;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  form button {
    background: var(--accent); color: #06122b; border: none; border-radius: 10px;
    padding: 0 20px; font-weight: 600; cursor: pointer;
  }
  form button:disabled { opacity: 0.5; cursor: default; }
  .hint { color: var(--muted); font-size: 12px; padding: 0 18px 10px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <span class="dot" id="health" title="checkpointer status"></span>
    <h1>LangGraph ReAct Agent</h1>
    <span class="meta" id="thread"></span>
    <button id="new">New chat</button>
  </header>
  <div id="messages"></div>
  <form id="composer">
    <textarea id="input" rows="1" placeholder="Ask something… (try: what's the weather in Tokyo?)" autofocus></textarea>
    <button type="submit" id="send">Send</button>
  </form>
  <div class="hint">State persists per conversation in Lakebase — reuse this tab to continue, or start a New chat.</div>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  const messages = $("messages"), input = $("input"), form = $("composer"), sendBtn = $("send");

  // Persist a thread_id so the conversation resumes across reloads (Lakebase-backed).
  let threadId = localStorage.getItem("thread_id");
  if (!threadId) { threadId = "web-" + Math.random().toString(36).slice(2, 10); localStorage.setItem("thread_id", threadId); }
  $("thread").textContent = threadId;

  $("new").onclick = () => {
    threadId = "web-" + Math.random().toString(36).slice(2, 10);
    localStorage.setItem("thread_id", threadId);
    $("thread").textContent = threadId;
    messages.innerHTML = "";
    input.focus();
  };

  // Health indicator
  fetch("health").then(r => r.json()).then(d => {
    const dot = $("health");
    dot.classList.add(d.checkpointer && d.checkpointer.startsWith("lakebase") ? "ok" : "bad");
    dot.title = "checkpointer: " + (d.checkpointer || "unknown");
  }).catch(() => {});

  function addBubble(role) {
    const wrap = document.createElement("div");
    wrap.className = "msg " + role;
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    wrap.appendChild(bubble);
    messages.appendChild(wrap);
    messages.scrollTop = messages.scrollHeight;
    return bubble;
  }

  function autoscroll() { messages.scrollTop = messages.scrollHeight; }

  async function send(text) {
    addBubble("user").textContent = text;
    const bubble = addBubble("assistant");
    bubble.classList.add("cursor");
    let toolBar = null, answer = "";

    try {
      const res = await fetch("chat", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ thread_id: threadId, message: text }),
      });
      if (!res.ok) throw new Error("HTTP " + res.status);

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = "";
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        let i;
        while ((i = buf.indexOf("\n\n")) >= 0) {
          const line = buf.slice(0, i).trim(); buf = buf.slice(i + 2);
          if (!line.startsWith("data:")) continue;
          const payload = line.slice(5).trim();
          if (payload === "[DONE]") { bubble.classList.remove("cursor"); return; }
          let ev; try { ev = JSON.parse(payload); } catch { continue; }
          if (ev.type === "token") {
            answer += ev.content; bubble.textContent = answer; autoscroll();
          } else if (ev.type === "tool") {
            if (!toolBar) { toolBar = document.createElement("div"); toolBar.className = "tools"; bubble.before(toolBar); }
            const chip = document.createElement("span"); chip.className = "tool-chip"; chip.textContent = ev.name;
            toolBar.appendChild(chip); autoscroll();
          } else if (ev.type === "error") {
            bubble.classList.add("err"); bubble.textContent = "Error: " + ev.message;
          }
        }
      }
      bubble.classList.remove("cursor");
    } catch (err) {
      bubble.classList.remove("cursor");
      bubble.classList.add("err");
      bubble.textContent = "Request failed: " + err.message;
    }
  }

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;
    input.value = ""; input.style.height = "auto";
    send(text);
  });

  // Enter to send, Shift+Enter for newline; grow textarea.
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
  });
  input.addEventListener("input", () => {
    input.style.height = "auto"; input.style.height = Math.min(input.scrollHeight, 160) + "px";
  });
</script>
</body>
</html>
